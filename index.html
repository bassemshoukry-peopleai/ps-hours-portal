<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PS Hours — People.ai</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Chivo+Mono:wght@400;500&display=swap');
  /* KMR Waldenburg not on Google Fonts - using Inter as closest system match */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --graphite: #171721;
    --graphite-40: #55555E;
    --graphite-30: #7F7F85;
    --graphite-20: #ABABAD;
    --graphite-10: #D5D5D6;
    --graphite-5: #F5F5F5;
    --horizon: #6296AD;
    --horizon-60: #447C93;
    --horizon-10: #DBEBF2;
    --white: #FFFFFF;
    --surface-gray: #BBBCBC;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--graphite-5);min-height:100vh;padding:2rem 1rem;color:var(--graphite)}
  .wrap{max-width:640px;margin:0 auto}

  /* Logo */
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:2.5rem}
  .logo-svg{display:flex;align-items:center;height:20px;flex-shrink:0}
  .logo-svg svg{height:20px;width:auto}
  .logo-divider{width:1px;height:18px;background:var(--graphite-20);margin:0 4px}
  .logo-sub{font-family:'Chivo Mono',monospace;font-size:11px;font-weight:500;color:var(--graphite-40);letter-spacing:0.08em;text-transform:uppercase}

  h1{font-family:'Inter',sans-serif;font-size:24px;font-weight:500;color:var(--graphite);margin-bottom:4px;letter-spacing:-0.3px}
  .subtitle{font-size:14px;color:var(--graphite-40);margin-bottom:2rem;line-height:1.5}
  .wbadge{display:inline-block;font-family:'Chivo Mono',monospace;font-size:10px;font-weight:500;padding:3px 10px;border-radius:3px;background:var(--horizon-10);color:var(--horizon-60);border:1px solid var(--horizon);margin-left:10px;vertical-align:middle;letter-spacing:0.04em;text-transform:uppercase}

  .card{background:var(--white);border:1px solid var(--graphite-10);border-radius:8px;padding:1.5rem;margin-bottom:1rem}
  .slabel{font-family:'Chivo Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.12em;color:var(--graphite-30);text-transform:uppercase;margin-bottom:.875rem}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .rowfull{margin-bottom:12px}
  .fld{display:flex;flex-direction:column;gap:5px}
  .fld label{font-size:11px;color:var(--graphite-40);font-weight:500;letter-spacing:0.02em}
  .fld input,.fld select,.fld textarea{font-size:14px;padding:9px 11px;border:1px solid var(--graphite-10);border-radius:6px;background:var(--graphite-5);color:var(--graphite);width:100%;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
  .fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--horizon);background:var(--white);box-shadow:0 0 0 3px var(--horizon-10)}
  .fld textarea{resize:vertical;min-height:60px;line-height:1.5}

  .ecard{background:var(--graphite-5);border:1px solid var(--graphite-10);border-radius:8px;padding:11px 13px;margin-bottom:6px;display:flex;align-items:flex-start;gap:12px}
  .ecard.suggested{border-color:var(--horizon);background:var(--horizon-10)}
  .einfo{flex:1;min-width:0}
  .eproj{font-size:14px;font-weight:500;color:var(--graphite);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .emeta{font-size:12px;color:var(--graphite-40);margin-top:2px}
  .enotes{font-size:12px;color:var(--graphite-30);margin-top:3px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ehrs{font-size:22px;font-weight:300;color:var(--graphite);min-width:52px;text-align:right;line-height:1;font-family:'Inter',sans-serif}
  .ehrs span{font-size:11px;color:var(--graphite-30);font-weight:400}
  .erm{font-size:16px;cursor:pointer;color:var(--graphite-20);background:none;border:none;padding:0 2px;line-height:1;transition:color .1s}
  .erm:hover{color:var(--graphite)}
  .suggbadge{display:inline-block;font-family:'Chivo Mono',monospace;font-size:9px;font-weight:500;padding:2px 6px;border-radius:3px;background:var(--horizon-10);color:var(--horizon-60);border:1px solid var(--horizon);margin-left:6px;vertical-align:middle;letter-spacing:0.04em;text-transform:uppercase}
  .notebadge{display:inline-block;font-family:'Chivo Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;background:var(--graphite-5);color:var(--graphite-40);border:1px solid var(--graphite-10);margin-left:6px;vertical-align:middle;letter-spacing:0.04em;text-transform:uppercase}

  .tbar{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--white);border-radius:8px;border:1px solid var(--graphite-10);margin-bottom:1rem}
  .tlbl{font-size:13px;color:var(--graphite-40)}
  .thrs{font-size:24px;font-weight:300;color:var(--graphite);font-family:'Inter',sans-serif}

  .empty-state{font-size:13px;color:var(--graphite-30);text-align:center;padding:1.5rem 0}
  .btnrow{display:flex;gap:8px;margin-bottom:1rem}
  .btnadd{flex:1;padding:10px;font-size:13px;font-weight:500;background:none;border:1px solid var(--graphite-10);border-radius:6px;color:var(--graphite-40);cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
  .btnadd:hover{border-color:var(--graphite);color:var(--graphite);background:var(--white)}
  .btncal{flex:1;padding:10px;font-size:13px;font-weight:500;background:none;border:1px solid var(--horizon);border-radius:6px;color:var(--horizon-60);cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
  .btncal:hover{background:var(--horizon-10);color:var(--horizon-60)}
  .btncal:disabled{opacity:.5;cursor:not-allowed}
  .btnsubmit{width:100%;padding:12px;font-size:14px;font-weight:500;background:var(--graphite);color:var(--white);border:none;border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .15s;letter-spacing:0.01em}
  .btnsubmit:hover{opacity:.85}
  .btnsubmit:disabled{opacity:.4;cursor:not-allowed}
  .overlay{border:1px solid var(--graphite-10);border-radius:8px;padding:1.25rem;margin-bottom:1rem;background:var(--white)}
  .oacts{display:flex;gap:8px;margin-top:12px}
  .btnok{flex:1;padding:9px;font-size:13px;background:var(--graphite);color:var(--white);border:none;border-radius:6px;cursor:pointer;font-weight:500;font-family:'Inter',sans-serif}
  .btnok:hover{opacity:.85}
  .btncancel{padding:9px 16px;font-size:13px;background:none;border:1px solid var(--graphite-10);border-radius:6px;color:var(--graphite-40);cursor:pointer;font-family:'Inter',sans-serif}
  .btncancel:hover{border-color:var(--graphite);color:var(--graphite)}

  .status{text-align:center;padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:1rem;line-height:1.5}
  .s-ok{background:#f0faf5;color:#1a7a4a;border:1px solid #b7e8cf}
  .s-err{background:#fdf2f2;color:#8b2020;border:1px solid #f5c6c6}
  .s-load{background:var(--graphite-5);color:var(--graphite-40);border:1px solid var(--graphite-10)}
  .s-warn{background:var(--horizon-10);color:var(--horizon-60);border:1px solid var(--horizon)}

  .hint{font-size:12px;color:var(--horizon-60);background:var(--horizon-10);padding:8px 12px;border-radius:6px;border:1px solid var(--horizon);margin-bottom:1rem}

  .tabs{display:flex;margin-bottom:1.25rem;border-bottom:1px solid var(--graphite-10)}
  .tab{padding:8px 16px;font-size:13px;font-weight:500;color:var(--graphite-30);cursor:pointer;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;font-family:'Inter',sans-serif;transition:all .15s}
  .tab.active{color:var(--graphite);border-bottom-color:var(--graphite)}
  .tab-pane{display:none}
  .tab-pane.active{display:block}

  .lw-row{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-radius:6px;margin-bottom:4px;background:var(--white);border:1px solid var(--graphite-10)}
  .lw-proj{font-size:13px;font-weight:500;color:var(--graphite)}
  .lw-hrs{font-size:16px;font-weight:300;color:var(--graphite);font-family:'Inter',sans-serif}
  .lw-hrs span{font-size:11px;color:var(--graphite-30);font-weight:400}
  .lw-total{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border-radius:6px;background:var(--graphite);border:1px solid var(--graphite);margin-top:8px}
  .lw-total span:first-child{font-family:'Chivo Mono',monospace;font-size:11px;font-weight:500;color:var(--surface-gray);letter-spacing:0.08em;text-transform:uppercase}
  .lw-hrs-total{font-size:16px;font-weight:300;color:var(--white);font-family:'Inter',sans-serif}
  .lw-hrs-total span{font-size:11px;color:var(--graphite-20);font-weight:400}
  .lw-loading{font-size:13px;color:var(--graphite-30);text-align:center;padding:1.5rem 0}

  @media(max-width:500px){.row2{grid-template-columns:1fr}}
</style>
</head>

    });
}

// Smart fuzzy match: score meeting title against project name using word overlap
function matchProject(titleLow, projects) {
  function tokenize(s) {
    return s.toLowerCase().replace(/[-\/+,&.]/g,' ').split(/\s+/).filter(function(t){ return t.length>=3; });
  }
  // Generic words that appear in project names but shouldn't drive matches
  var stop = {the:1,and:1,for:1,with:1,from:1,
              forensics:1,forecasting:1,premium:1,enterprise:1,deployment:1,
              global:1,support:1,project:1,management:1,assessment:1,
              reengagement:1,migration:1,onboarding:1,matching:1,salesai:1,
              data:1,foundation:1,intelligence:1,account:1,ongoing:1,
              post:1,going:1,consulting:1,opportunity:1,land:1,opp:1,
              intel:1,signals:1,questions:1,scorecard:1,assist:1,poc:1,
              service:1,services:1,mcp:1,new:1,user:1};

  var titleTokens = tokenize(titleLow).filter(function(t){ return !stop[t]; });
  if(!titleTokens.length) return null;

  var best = null, bestScore = 0;

  projects.forEach(function(proj){
    // Only match against the client name part (before first " - ")
    var clientPart = proj.indexOf(' - ') !== -1 ? proj.split(' - ')[0] : proj;
    var clientTokens = tokenize(clientPart).filter(function(t){ return !stop[t]; });
    if(!clientTokens.length) return;

    // Count exact token matches only
    var matches = 0;
    clientTokens.forEach(function(ct){
      titleTokens.forEach(function(tt){
        if(ct === tt) matches++;
      });
    });
    if(matches === 0) return;

    // For 1-2 token client names, ALL tokens must match (strict)
    // For longer names, require 60% match
    var required = clientTokens.length <= 2 ? clientTokens.length : Math.ceil(clientTokens.length * 0.6);
    if(matches < required) return;

    var score = matches / clientTokens.length;
    if(score > bestScore) { bestScore = score; best = proj; }
  });

  return best;
}

function processCal(events){
  var projects = ALL_LOADED_PROJECTS.length ? ALL_LOADED_PROJECTS : ALL_PROJECTS.map(function(p){return p.project;});
  var projectMap={};
  events.forEach(function(ev){
    if(!ev.start||!ev.start.dateTime)return;
    if(ev.attendees){
      for(var i=0;i<ev.attendees.length;i++){
        if(ev.attendees[i].self&&ev.attendees[i].responseStatus==='declined')return;
      }
    }
    var start=new Date(ev.start.dateTime),end=new Date(ev.end.dateTime);
    var mins=(end-start)/60000;
    if(mins<5)return;
    var hrs=Math.round((mins/60)*4)/4;
    var title=ev.summary||'(no title)';
    var titleLow=title.toLowerCase();
    var matched=matchProject(titleLow, projects);
    if(!matched)matched='Other Time';
    if(!projectMap[matched])projectMap[matched]={hours:0,meetings:[],isOther:false};
    if(matched==='Other Time') projectMap[matched].isOther=true;
    projectMap[matched].hours+=hrs;
    var days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    projectMap[matched].meetings.push(title+' ('+days[start.getDay()]+' '+(start.getMonth()+1)+'/'+start.getDate()+', '+hrs+'h)');
  });
  var used=getUsed(),added=0,skipped=0;
  Object.keys(projectMap).forEach(function(proj){
    if(used[proj]){skipped++;return;}
    var d=projectMap[proj];
    var hrs=Math.round(d.hours*4)/4;
    // Build notes: deduplicated meeting titles only, no dates/times
    var seen={};
    var dedupedTitles=[];
    d.meetings.forEach(function(m){
      // Strip the " (Day M/D, Xh)" suffix to get just the title
      var title=m.replace(/\s*\([A-Za-z]+\s+\d+\/\d+,\s*[\d.]+h\)$/, '').trim();
      if(!seen[title]){seen[title]=1;dedupedTitles.push(title);}
    });
    var entryNotes = d.isOther ? '' : dedupedTitles.join('; ');
    entries.push({project:proj,account:ACCT_MAP[proj]||'',hours:hrs,notes:entryNotes,meetings:d.meetings,suggested:true,editing:false,isOther:d.isOther});
    added++;
  });
  renderEntries();
  if(added===0&&skipped===0)showStatus('No meetings found for this week.','warn');
  else if(added===0)showStatus('All suggested projects already added.','warn');
  else showStatus('Added '+added+' suggestion'+(added>1?'s':'')+' from calendar. Tap each to review.','ok');
}

function doneEditingOther(i){
  var e=entries[i];
  if(!e||!e.meetings) return;
  // Collect per-meeting assignments
  var toAdd={}; // project -> {hours, meetingLabels[]}
  var otherHours=0;
  e.meetings.forEach(function(m,mi){
    var sel=document.getElementById('ereassign_'+i+'_'+mi);
    var proj=sel?sel.value:'';
    var hrsMatch=m.match(/,\s*([\d.]+)h\)$/);
    var mhrs=hrsMatch?parseFloat(hrsMatch[1]):0;
    if(proj && proj!=='Other Time'){
      if(!toAdd[proj]) toAdd[proj]={hours:0,meetings:[]};
      toAdd[proj].hours+=mhrs;
      toAdd[proj].meetings.push(m);
    } else {
      otherHours+=mhrs;
    }
  });
  // Remove the Other Time entry
  entries.splice(i,1);
  // Add reassigned entries (merge with existing if project already exists)
  Object.keys(toAdd).forEach(function(proj){
    var d=toAdd[proj];
    var hrs=Math.round(d.hours*4)/4;
    var existing=-1;
    entries.forEach(function(en,idx){if(en.project===proj)existing=idx;});
    if(existing!==-1){
      entries[existing].hours=Math.round((entries[existing].hours+hrs)*4)/4;
    } else {
      entries.push({project:proj,account:ACCT_MAP[proj]||'',hours:hrs,notes:d.meetings.join('; '),meetings:d.meetings,suggested:true,editing:false});
    }
  });
  // Re-add Other Time entry if anything remains
  if(otherHours>0){
    var remainMeetings=[];
    e.meetings.forEach(function(m,mi){
      var sel=document.getElementById('ereassign_'+i+'_'+mi);
      var proj=sel?sel.value:'';
      if(!proj||proj==='Other Time') remainMeetings.push(m);
    });
    entries.push({project:'Other Time',account:'Internal',hours:Math.round(otherHours*4)/4,notes:'',meetings:remainMeetings,suggested:true,editing:false,isOther:true});
  }
  renderEntries();
}

function doSubmit(){
  var owner=document.getElementById('ownerSel').value;
  if(!owner){alert('Please select your name.');return;}
  if(!entries.length){alert('Please add at least one entry.');return;}
  var rawDate=document.getElementById('weekDate').value;
  var weekISO=fmtISO(getMonday(new Date(rawDate+'T12:00:00')));
  var btn=document.getElementById('btnSubmit');
  btn.disabled=true; btn.textContent='Submitting...';
  showStatus('Writing to Google Sheet...','load');
  var payload={entries:entries.map(function(e){return{project:e.project,account:e.account,owner:owner,weekISO:weekISO,hours:e.hours,notes:e.notes||''};})};
  fetch(WEBHOOK_URL,{method:'POST',body:JSON.stringify(payload),headers:{'Content-Type':'application/json'}})
    .then(function(r){return r.json();})
    .then(function(result){
      if(result.status===200){
        showStatus('\u2713 '+result.message+' Week of '+fmtD(getMonday(new Date(rawDate+'T12:00:00')))+', logged for '+owner+'.','ok');
        entries=[]; lwLoaded=false; renderEntries(); btn.textContent='Submit another week';
      } else{showStatus('Partial: '+result.message,'err');btn.textContent='Retry';}
      btn.disabled=false;
    })
    .catch(function(err){showStatus('Submission failed: '+err.message,'err');btn.textContent='Retry';btn.disabled=false;});
}

function showStatus(msg,type){
  var el=document.getElementById('statusMsg');
  el.className='status s-'+type; el.textContent=msg; el.style.display='block';
  if(type==='ok')setTimeout(function(){el.style.display='none';},10000);
}
</script>
